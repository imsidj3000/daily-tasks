<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Tasks">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <title>Tasks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #000; --card: #1c1c1e; --card2: #2c2c2e;
      --text: #fff; --text2: rgba(235,235,245,.8); --text3: #8e8e93;
      --high: #ff453a; --medium: #ff9f0a; --low: #30d158;
      --accent: #0a84ff;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      min-height: 100vh; padding-bottom: 60px;
    }

    /* Header */
    .header { padding: 60px 20px 16px; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .header h1 { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
    .header .date { font-size: 14px; color: var(--text3); margin-top: 4px; }
    .task-count {
      font-size: 13px; color: var(--text3);
      background: var(--card); padding: 6px 14px;
      border-radius: 20px; margin-top: 6px;
    }

    /* Add bar */
    .add-bar { padding: 0 16px 8px; display: flex; gap: 8px; align-items: center; }
    .add-bar input {
      flex: 1; background: var(--card); border: none;
      border-radius: 12px; padding: 14px 16px;
      font-size: 16px; color: var(--text); outline: none;
    }
    .add-bar input::placeholder { color: var(--text3); }
    .priority-btn {
      width: 46px; height: 46px; border: none; border-radius: 12px;
      background: var(--card); font-size: 18px; cursor: pointer;
    }
    .add-btn {
      width: 46px; height: 46px; background: var(--accent);
      border: none; border-radius: 12px; color: #fff;
      font-size: 26px; font-weight: 300; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .add-btn:active { opacity: 0.7; transform: scale(0.95); }
    .priority-hint { font-size: 12px; color: var(--text3); padding: 0 16px 12px; text-align: right; }
    .reminder-row {
      display: none; align-items: center; gap: 8px;
      padding: 10px 12px 0; flex-wrap: wrap;
    }
    .reminder-row.show { display: flex; }
    .reminder-row input[type="time"] {
      background: var(--card2); border: none; border-radius: 8px;
      padding: 6px 10px; color: var(--text); font-size: 13px;
      color-scheme: dark; flex: 1;
    }
    .reminder-row .set-btn {
      background: var(--accent); border: none; border-radius: 8px;
      padding: 6px 14px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .reminder-row .clear-btn {
      background: none; border: none; color: var(--text3);
      font-size: 13px; cursor: pointer; padding: 6px;
    }
    .reminder-chip {
      font-size: 11px; color: var(--accent);
      background: rgba(10,132,255,.15); border-radius: 20px;
      padding: 2px 8px; cursor: pointer;
    }
    .reminder-chip.sent { color: var(--text3); background: rgba(255,255,255,.08); }

    /* Task list */
    .task-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }

    .task-item {
      background: var(--card); border-radius: 14px;
      display: flex; align-items: center; gap: 10px;
      padding: 14px 12px 14px 0;
      position: relative; overflow: hidden;
      transition: transform 0.2s, opacity 0.2s;
    }
    .task-item.removing { transform: translateX(-110%); opacity: 0; }

    .priority-bar {
      width: 4px; align-self: stretch; border-radius: 0 2px 2px 0;
      min-height: 24px; flex-shrink: 0;
    }
    .priority-bar.high { background: var(--high); }
    .priority-bar.medium { background: var(--medium); }
    .priority-bar.low { background: var(--low); }
    .priority-bar.none { background: transparent; }

    .drag-handle {
      color: var(--text3); font-size: 16px; cursor: grab;
      padding: 0 2px; user-select: none; flex-shrink: 0;
    }
    .task-content { flex: 1; min-width: 0; }
    .task-text { font-size: 16px; color: var(--text); line-height: 1.3; word-break: break-word; }

    .priority-badge {
      display: inline-block; font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px; margin-top: 4px;
    }
    .priority-badge.high { background: rgba(255,69,58,.2); color: var(--high); }
    .priority-badge.medium { background: rgba(255,159,10,.2); color: var(--medium); }
    .priority-badge.low { background: rgba(48,209,88,.2); color: var(--low); }
    .priority-badge.none { display: none; }

    .del-btn {
      background: none; border: none; color: var(--text3);
      font-size: 22px; cursor: pointer; padding: 4px 10px;
      flex-shrink: 0; border-radius: 8px; line-height: 1;
    }
    .del-btn:active { color: var(--high); }

    .sortable-ghost { opacity: 0.25; }
    .sortable-chosen { transform: scale(1.02); box-shadow: 0 8px 24px rgba(0,0,0,.5); z-index: 10; }

    /* Empty */
    .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 16px; line-height: 1.6; }

    /* Toast */
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card2); color: var(--text);
      padding: 10px 22px; border-radius: 22px;
      font-size: 14px; transition: transform 0.3s ease;
      z-index: 100; pointer-events: none; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Setup */
    #setupScreen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 32px; gap: 16px; z-index: 200;
    }
    #setupScreen .icon { font-size: 64px; }
    #setupScreen h2 { font-size: 24px; font-weight: 700; text-align: center; }
    #setupScreen p { font-size: 15px; color: var(--text3); text-align: center; line-height: 1.5; max-width: 320px; }
    #setupScreen input {
      width: 100%; background: var(--card); border: none;
      border-radius: 12px; padding: 14px 16px;
      font-size: 15px; color: var(--text); outline: none;
    }
    #setupScreen .err { color: var(--high); font-size: 13px; min-height: 16px; text-align: center; }
    #setupScreen button {
      width: 100%; background: var(--accent); color: #fff;
      border: none; border-radius: 14px;
      padding: 16px; font-size: 17px; font-weight: 600; cursor: pointer;
    }
    #setupScreen button:active { opacity: 0.8; }
  </style>
</head>
<body>

<div id="setupScreen">
  <div class="icon">✅</div>
  <h2>Daily Tasks</h2>
  <p>Enter your GitHub token to get started. Saved only on this device.</p>
  <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxx" autocomplete="off">
  <p class="err" id="setupErr"></p>
  <button onclick="saveToken()">Get Started</button>
</div>

<div id="mainApp" style="display:none">
  <div class="header">
    <div class="header-top">
      <div>
        <h1>Tasks</h1>
        <div class="date" id="dateLabel"></div>
      </div>
      <div class="task-count" id="taskCount">0 tasks</div>
    </div>
  </div>

  <div class="add-bar">
    <input type="text" id="taskInput" placeholder="Add a task..." maxlength="200" autocomplete="off">
    <button class="priority-btn" id="priorityBtn" onclick="cyclePriority()">⚪</button>
    <button class="add-btn" onclick="addTask()">+</button>
  </div>
  <div class="priority-hint" id="priorityHint">Tap ⚪ to set priority</div>

  <div id="taskList" class="task-list"></div>
  <div class="empty" id="emptyState" style="display:none">
    <div class="icon">📋</div>
    <p>No tasks yet.<br>Add one above.</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script>
  const GIST_ID = "1fc73de2d2cbff651688cbddc5b82892";
  const FILE = "tasks.json";
  let TOKEN = "", tasks = [], saveTimer = null, currentPriority = "none", reminderOn = false;

  const PRIORITY = {
    none:   { label: "None",   emoji: "⚪" },
    low:    { label: "Low",    emoji: "🟢" },
    medium: { label: "Medium", emoji: "🟡" },
    high:   { label: "High",   emoji: "🔴" },
  };
  const P_ORDER = ["none", "low", "medium", "high"];

  const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const now = new Date();
  document.getElementById("dateLabel").textContent =
    `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;

  const saved = localStorage.getItem("gh_token");
  if (saved) { TOKEN = saved; showMain(); }

  async function saveToken() {
    const t = document.getElementById("tokenInput").value.trim();
    const errEl = document.getElementById("setupErr");
    if (!t) { errEl.textContent = "Please enter your token."; return; }
    errEl.textContent = "Verifying...";
    try {
      const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
        headers: { Authorization: `token ${t}` }
      });
      if (!r.ok) throw new Error("Invalid token or no access.");
      localStorage.setItem("gh_token", t);
      TOKEN = t;
      showMain();
    } catch(e) { errEl.textContent = e.message; }
  }

  function showMain() {
    document.getElementById("setupScreen").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    load();
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Enter" && document.activeElement === document.getElementById("taskInput")) addTask();
  });

  function toggleReminderRow(id) {
    const row = document.getElementById(`rrow-${id}`);
    const isShowing = row.classList.contains("show");
    // Close all open rows first
    document.querySelectorAll(".reminder-row.show").forEach(r => r.classList.remove("show"));
    if (!isShowing) {
      row.classList.add("show");
      const input = document.getElementById(`rtime-${id}`);
      if (!input.value) {
        const d = new Date(Date.now() + 3600000);
        input.value = `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
      }
    }
  }

  function setReminder(id) {
    const input = document.getElementById(`rtime-${id}`);
    if (!input.value) return;
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.reminder = getReminderISO(input.value);
    task.reminder_sent = false;
    render();
    scheduleSave();
    showToast("Reminder set ✓");
  }

  function clearReminder(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    task.reminder = null;
    task.reminder_sent = false;
    render();
    scheduleSave();
    showToast("Reminder removed");
  }

  function getReminderISO(timeStr) {
    const [h, m] = timeStr.split(":").map(Number);
    const now = new Date();
    const dt = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m);
    if (dt <= now) dt.setDate(dt.getDate() + 1);
    return dt.toISOString().slice(0, 16);
  }

  function cyclePriority() {
    currentPriority = P_ORDER[(P_ORDER.indexOf(currentPriority) + 1) % P_ORDER.length];
    document.getElementById("priorityBtn").textContent = PRIORITY[currentPriority].emoji;
    document.getElementById("priorityHint").textContent = `Priority: ${PRIORITY[currentPriority].label}`;
  }

  async function load() {
    try {
      const r = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
        headers: { Authorization: `token ${TOKEN}` }
      });
      const data = await r.json();
      const content = JSON.parse(data.files[FILE].content);
      tasks = (content.tasks || []).map(t =>
        typeof t === "string" ? { id: uid(), text: t, priority: "none" } : t
      );
      render();
    } catch(e) { showToast("Failed to load"); }
  }

  function uid() { return Math.random().toString(36).slice(2, 10); }

  function render() {
    const list = document.getElementById("taskList");
    const empty = document.getElementById("emptyState");
    const count = document.getElementById("taskCount");
    list.innerHTML = "";
    count.textContent = tasks.length === 1 ? "1 task" : `${tasks.length} tasks`;
    if (tasks.length === 0) { empty.style.display = "block"; return; }
    empty.style.display = "none";
    tasks.forEach(t => {
      const p = t.priority || "none";
      const div = document.createElement("div");
      div.className = "task-item";
      div.dataset.id = t.id;
      const hasReminder = t.reminder && !t.reminder_sent;
      const reminderChip = hasReminder
        ? `<span class="reminder-chip" onclick="toggleReminderRow('${t.id}')">⏰ ${formatReminder(t.reminder)}</span>`
        : `<span class="reminder-chip" style="background:none;color:var(--text3)" onclick="toggleReminderRow('${t.id}')">⏰ Set reminder</span>`;
      div.innerHTML = `
        <div class="priority-bar ${p}"></div>
        <span class="drag-handle">⠿</span>
        <div class="task-content">
          <div class="task-text">${escHtml(t.text)}</div>
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:5px">
            <span class="priority-badge ${p}">${PRIORITY[p]?.label || ""}</span>
            ${reminderChip}
          </div>
          <div class="reminder-row" id="rrow-${t.id}">
            <input type="time" id="rtime-${t.id}" value="${t.reminder ? t.reminder.slice(11,16) : ""}">
            <button class="set-btn" onclick="setReminder('${t.id}')">Set</button>
            ${t.reminder ? `<button class="clear-btn" onclick="clearReminder('${t.id}')">Remove</button>` : ""}
          </div>
        </div>
        <button class="del-btn" onclick="deleteTask('${t.id}',this)">×</button>
      `;
      list.appendChild(div);
    });
    initSortable();
  }

  function formatReminder(iso) {
    const d = new Date(iso);
    const h = d.getHours(), m = d.getMinutes();
    const ampm = h >= 12 ? "PM" : "AM";
    return `${h % 12 || 12}:${String(m).padStart(2,"0")} ${ampm}`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function addTask() {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();
    if (!text) return;
    tasks.push({ id: uid(), text, priority: currentPriority, reminder: null, reminder_sent: false });
    input.value = "";
    currentPriority = "none";
    document.getElementById("priorityBtn").textContent = "⚪";
    document.getElementById("priorityHint").textContent = "Tap ⚪ to set priority";
    render();
    scheduleSave();
  }

  function deleteTask(id, btn) {
    const item = btn.closest(".task-item");
    item.classList.add("removing");
    setTimeout(() => {
      tasks = tasks.filter(t => t.id !== id);
      render();
      scheduleSave();
    }, 200);
  }

  function initSortable() {
    const list = document.getElementById("taskList");
    if (list._sortable) { list._sortable.destroy(); }
    list._sortable = Sortable.create(list, {
      handle: ".drag-handle",
      animation: 150,
      ghostClass: "sortable-ghost",
      chosenClass: "sortable-chosen",
      onEnd: () => {
        const ids = Array.from(list.querySelectorAll(".task-item")).map(el => el.dataset.id);
        tasks = ids.map(id => tasks.find(t => t.id === id)).filter(Boolean);
        scheduleSave();
      }
    });
  }

  function scheduleSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(save, 1000);
  }

  async function save() {
    try {
      await fetch(`https://api.github.com/gists/${GIST_ID}`, {
        method: "PATCH",
        headers: { Authorization: `token ${TOKEN}`, "Content-Type": "application/json" },
        body: JSON.stringify({ files: { [FILE]: { content: JSON.stringify({ tasks }) } } })
      });
      showToast("Saved ✓");
    } catch(e) { showToast("Save failed"); }
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  }

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }
</script>
</body>
</html>
